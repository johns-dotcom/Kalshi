<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kalshi">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<title>Kalshi</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --surface2: #181818;
    --border: #222;
    --text: #d4d4d4;
    --dim: #555;
    --green: #4caf50;
    --red: #e53935;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.4;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── LOCK SCREEN ─── */
  #lockScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    padding: 40px 20px;
    user-select: none;
    -webkit-user-select: none;
  }

  .lock-icon {
    width: 48px; height: 48px; border-radius: 50%;
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }

  .lock-icon-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
  }

  .lock-label {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .passcode-dots {
    display: flex; gap: 16px; margin-bottom: 36px; height: 14px;
  }

  .passcode-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 1.5px solid #444; background: transparent;
    transition: all 0.1s;
  }

  .passcode-dot.filled { background: var(--text); border-color: var(--text); }

  .passcode-dots.error .passcode-dot {
    border-color: var(--red); background: transparent;
    animation: shake 0.4s ease-in-out;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); } 40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); } 80% { transform: translateX(5px); }
  }

  .numpad {
    display: grid; grid-template-columns: repeat(3, 75px);
    gap: 14px; justify-content: center;
  }

  .numpad-btn {
    width: 75px; height: 75px; border-radius: 50%;
    border: 1px solid #333; background: rgba(255,255,255,0.03);
    color: var(--text); font-size: 28px; font-weight: 300;
    font-family: var(--mono);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }

  .numpad-btn:active { background: rgba(255,255,255,0.12); }
  .numpad-btn .sub { font-size: 8px; letter-spacing: 2px; color: var(--dim); margin-top: 1px; }
  .numpad-btn.empty { border: none; background: none; }
  .numpad-btn.del { border: none; background: none; font-size: 13px; color: var(--dim); letter-spacing: 1px; }
  .numpad-btn.del:active { color: var(--text); }

  @media (max-height: 680px) {
    .numpad { gap: 10px; }
    .numpad-btn { width: 65px; height: 65px; font-size: 24px; }
    .passcode-dots { margin-bottom: 24px; }
  }

  /* ─── APP SHELL ─── */
  #app { display: none; flex-direction: column; min-height: 100vh; min-height: 100dvh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }

  .topbar-left { display: flex; align-items: center; gap: 12px; }

  .menu-btn {
    background: none; border: none; color: var(--dim); font-size: 20px;
    cursor: pointer; padding: 4px; line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }

  .app-title {
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text);
  }

  .live-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; letter-spacing: 1px; color: var(--green);
  }

  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
  }

  .live-dot.off { background: var(--red); box-shadow: 0 0 6px var(--red); }

  /* ─── BALANCE BAR ─── */
  .balance-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    overflow-x: auto; white-space: nowrap;
  }

  .balance-bar::-webkit-scrollbar { display: none; }

  .bal-amount {
    font-size: 16px; font-weight: 600; color: var(--green);
    display: flex; align-items: center; gap: 4px;
  }

  .bal-amount .sym { font-size: 12px; opacity: 0.7; }

  .chip {
    padding: 4px 10px; border-radius: 4px;
    font-size: 11px; font-family: var(--mono);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--dim); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .chip:active { background: #252525; }
  .chip.red { color: var(--red); border-color: rgba(229,57,53,0.3); }
  .chip.green { color: var(--green); border-color: rgba(76,175,80,0.3); }

  /* ─── MAIN CONTENT ─── */
  .content {
    flex: 1; overflow-y: auto;
    padding: 0 0 140px 0;
  }

  /* ─── SIDE DRAWER ─── */
  .drawer-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 300;
  }

  .drawer-overlay.open { display: block; }

  .drawer {
    position: fixed; top: 0; left: -280px; bottom: 0;
    width: 280px; background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 301; transition: left 0.25s ease;
    padding: 20px 0; overflow-y: auto;
  }

  .drawer-overlay.open .drawer { left: 0; }

  .drawer-section {
    padding: 8px 16px; font-size: 10px; letter-spacing: 2px;
    color: var(--dim); text-transform: uppercase; margin-top: 12px;
  }

  .drawer-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; color: var(--text); font-size: 13px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    font-family: var(--mono); border: none; background: none; width: 100%;
    text-align: left;
  }

  .drawer-item:active { background: var(--surface2); }
  .drawer-item.active { color: var(--green); }
  .drawer-item .icon { width: 20px; text-align: center; }

  /* ─── POSITIONS LIST ─── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 8px; font-size: 10px; letter-spacing: 2px;
    color: var(--dim); text-transform: uppercase;
  }

  .pos-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }

  .pos-item:active { background: var(--surface2); }

  .pos-ticker {
    font-size: 12px; font-weight: 600; color: var(--text);
    margin-bottom: 3px;
  }

  .pos-meta { font-size: 11px; color: var(--dim); }

  .pos-right { text-align: right; }

  .pos-value { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
  .pos-value.up { color: var(--green); }
  .pos-value.down { color: var(--red); }
  .pos-value.flat { color: var(--dim); }

  .pos-qty { font-size: 11px; color: var(--dim); }

  .side-tag {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; margin-right: 4px;
  }

  .side-tag.yes { background: rgba(76,175,80,0.15); color: var(--green); }
  .side-tag.no { background: rgba(229,57,53,0.15); color: var(--red); }

  /* ─── BOTTOM DOCK ─── */
  .dock {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom));
    z-index: 100;
  }

  .dock-stats {
    display: flex; justify-content: space-between;
    margin-bottom: 10px;
  }

  .dock-stat-label {
    font-size: 10px; letter-spacing: 2px;
    color: var(--dim); text-transform: uppercase;
  }

  .dock-stat-val { font-size: 15px; font-weight: 600; margin-top: 2px; }

  .dock-btn {
    width: 100%; padding: 13px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--dim); font-family: var(--mono);
    font-size: 12px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .dock-btn:active { background: #222; }
  .dock-btn.has-orders { background: var(--green); color: #000; border-color: var(--green); }

  /* ─── TRADE PANEL ─── */
  .trade-panel {
    display: none; position: fixed; inset: 0;
    background: var(--bg); z-index: 250;
    flex-direction: column;
  }

  .trade-panel.open { display: flex; }

  .trade-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }

  .trade-close {
    background: none; border: none; color: var(--dim);
    font-size: 24px; cursor: pointer; font-family: var(--mono);
    -webkit-tap-highlight-color: transparent;
  }

  .trade-body { flex: 1; padding: 16px; overflow-y: auto; }

  .trade-field { margin-bottom: 16px; }

  .trade-label {
    font-size: 10px; letter-spacing: 2px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 6px;
  }

  .trade-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 12px;
    font-size: 16px; font-family: var(--mono); outline: none;
    -webkit-appearance: none;
  }

  .trade-input:focus { border-color: var(--green); }
  .trade-input::placeholder { color: #333; }

  .side-btns {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }

  .side-btn {
    padding: 14px; font-family: var(--mono); font-size: 14px;
    font-weight: 700; letter-spacing: 2px; border: none;
    background: var(--surface2); color: var(--dim); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .side-btn:first-child { border-right: 1px solid var(--border); }
  .side-btn.sel-yes { background: rgba(76,175,80,0.12); color: var(--green); }
  .side-btn.sel-no { background: rgba(229,57,53,0.12); color: var(--red); }

  .trade-cost-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  .trade-cost-label { font-size: 10px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
  .trade-cost-val { font-size: 18px; font-weight: 600; }

  .trade-submit {
    width: 100%; padding: 16px; border-radius: 6px; border: none;
    background: var(--green); color: #000; font-family: var(--mono);
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer; margin-top: 12px;
    -webkit-tap-highlight-color: transparent;
  }

  .trade-submit:active { opacity: 0.8; }
  .trade-submit:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ─── ORDERS VIEW ─── */
  .order-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }

  .order-status-tag {
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; padding: 2px 6px; border-radius: 3px;
  }

  .order-status-tag.open { background: rgba(76,175,80,0.15); color: var(--green); }
  .order-status-tag.filled { background: rgba(76,175,80,0.25); color: var(--green); }

  .cancel-btn {
    background: none; border: 1px solid rgba(229,57,53,0.3);
    color: var(--red); font-family: var(--mono); font-size: 10px;
    padding: 4px 8px; border-radius: 4px; cursor: pointer;
    letter-spacing: 1px; -webkit-tap-highlight-color: transparent;
  }

  /* ─── EMPTY / MISC ─── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: #333; font-size: 12px; line-height: 1.8;
  }

  .empty .prompt { color: var(--dim); }

  .toast {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--surface); border: 1px solid var(--border);
    padding: 8px 16px; font-size: 12px; border-radius: 6px;
    z-index: 400; opacity: 0; transition: all 0.3s; pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { color: var(--green); border-color: rgba(76,175,80,0.3); }
  .toast.err { color: var(--red); border-color: rgba(229,57,53,0.3); }

  /* ─── MODAL ─── */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 350;
    align-items: center; justify-content: center; padding: 20px;
  }

  .modal-bg.open { display: flex; }

  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; width: 100%; max-width: 380px;
  }

  .modal-box h3 { font-size: 13px; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase; }
  .modal-box p { font-size: 12px; color: var(--dim); margin-bottom: 16px; line-height: 1.6; }
  .modal-box strong { color: var(--text); }

  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 6px; font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
  .modal-confirm { background: var(--green); color: #000; border: none; }
  .modal-cancel { background: var(--surface2); color: var(--dim); border: 1px solid var(--border); }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-icon"><div class="lock-icon-dot"></div></div>
  <div class="lock-label">Enter Passcode</div>
  <div class="passcode-dots" id="dots">
    <div class="passcode-dot"></div><div class="passcode-dot"></div><div class="passcode-dot"></div>
    <div class="passcode-dot"></div><div class="passcode-dot"></div><div class="passcode-dot"></div>
  </div>
  <div class="numpad" id="numpad">
    <button class="numpad-btn" data-k="1">1</button>
    <button class="numpad-btn" data-k="2">2<span class="sub">ABC</span></button>
    <button class="numpad-btn" data-k="3">3<span class="sub">DEF</span></button>
    <button class="numpad-btn" data-k="4">4<span class="sub">GHI</span></button>
    <button class="numpad-btn" data-k="5">5<span class="sub">JKL</span></button>
    <button class="numpad-btn" data-k="6">6<span class="sub">MNO</span></button>
    <button class="numpad-btn" data-k="7">7<span class="sub">PQRS</span></button>
    <button class="numpad-btn" data-k="8">8<span class="sub">TUV</span></button>
    <button class="numpad-btn" data-k="9">9<span class="sub">WXYZ</span></button>
    <div class="numpad-btn empty"></div>
    <button class="numpad-btn" data-k="0">0</button>
    <button class="numpad-btn del">DEL</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="toggleDrawer()">&#9776;</button>
      <span class="app-title">Kalshi</span>
    </div>
    <div class="live-badge" id="liveBadge">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveText">LIVE</span>
    </div>
  </div>

  <div class="balance-bar">
    <div class="bal-amount" id="balDisplay"><span class="sym">$</span><span id="balNum">--</span></div>
    <div class="chip red" onclick="adjustPrice(-10)">-10&cent;</div>
    <div class="chip red" onclick="adjustPrice(-5)">-5&cent;</div>
    <div class="chip green" onclick="adjustPrice(5)">+5&cent;</div>
    <div class="chip green" onclick="adjustPrice(10)">+10&cent;</div>
    <div class="chip" onclick="adjustQty(3)">3&times;</div>
    <div class="chip" onclick="adjustQty(5)">5&times;</div>
  </div>

  <div class="content" id="content">
    <!-- Positions view (default) -->
    <div id="view-positions">
      <div class="section-header">
        <span>Positions</span>
        <span id="posCount">0</span>
      </div>
      <div id="posList"></div>
    </div>

    <!-- Orders view -->
    <div id="view-orders" style="display:none;">
      <div class="section-header"><span>Open Orders</span></div>
      <div id="openList"></div>
      <div class="section-header" style="margin-top:8px;"><span>Recent Fills</span></div>
      <div id="fillsList"></div>
    </div>
  </div>

  <!-- DOCK -->
  <div class="dock">
    <div class="dock-stats">
      <div>
        <div class="dock-stat-label">Orders</div>
        <div class="dock-stat-val" id="dockOrders">0</div>
      </div>
      <div style="text-align:right;">
        <div class="dock-stat-label">Exposure</div>
        <div class="dock-stat-val" id="dockExposure">$0.00</div>
      </div>
    </div>
    <button class="dock-btn" id="dockBtn" onclick="openTrade()">No orders queued</button>
  </div>

</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer" onclick="closeDrawer(event)">
  <div class="drawer">
    <div class="drawer-section">Navigate</div>
    <button class="drawer-item active" onclick="showView('positions');closeDrawer();">
      <span class="icon">&#9632;</span> Positions
    </button>
    <button class="drawer-item" onclick="showView('orders');closeDrawer();">
      <span class="icon">&#9776;</span> Orders
    </button>
    <button class="drawer-item" onclick="openTrade();closeDrawer();">
      <span class="icon">&#9650;</span> New Trade
    </button>
    <div class="drawer-section">Account</div>
    <button class="drawer-item" onclick="loadPortfolio();closeDrawer();">
      <span class="icon">&#8635;</span> Refresh
    </button>
  </div>
</div>

<!-- TRADE PANEL -->
<div class="trade-panel" id="tradePanel">
  <div class="trade-header">
    <span style="font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;">New Order</span>
    <button class="trade-close" onclick="closeTrade()">&times;</button>
  </div>
  <div class="trade-body">
    <div class="trade-field">
      <div class="trade-label">Ticker</div>
      <input class="trade-input" type="text" id="tTicker" placeholder="TICKER" autocapitalize="characters" autocorrect="off" />
    </div>
    <div class="trade-field">
      <div class="trade-label">Side</div>
      <div class="side-btns">
        <button class="side-btn sel-yes" id="btnYes" onclick="setSide('yes')">YES</button>
        <button class="side-btn" id="btnNo" onclick="setSide('no')">NO</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="trade-field">
        <div class="trade-label">Price (cents)</div>
        <input class="trade-input" type="number" id="tPrice" placeholder="50" min="1" max="99" inputmode="numeric" />
      </div>
      <div class="trade-field">
        <div class="trade-label">Contracts</div>
        <input class="trade-input" type="number" id="tQty" placeholder="10" min="1" inputmode="numeric" />
      </div>
    </div>
    <div class="trade-cost-row">
      <div class="trade-cost-label">Max Cost</div>
      <div class="trade-cost-val" id="tCost">$0.00</div>
    </div>
    <button class="trade-submit" id="tSubmit" onclick="submitOrder()">Place Order</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <h3 id="mTitle">Confirm</h3>
    <p id="mBody"></p>
    <div class="modal-btns">
      <button class="modal-confirm" id="mConfirm">Confirm</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── API ───
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/kalshi' + path, opts);
  const text = await res.text();
  let json;
  try { json = JSON.parse(text); } catch (e) { throw new Error(text.substring(0, 200)); }
  if (!res.ok) {
    const msg = typeof json.message === 'string' ? json.message
      : typeof json.error === 'string' ? json.error
      : typeof json.error?.message === 'string' ? json.error.message
      : JSON.stringify(json);
    throw new Error(msg);
  }
  return json;
}

// ─── STATE ───
let positions = [];
let openOrders = [];
let fills = [];
let balance = 0;
let exposure = 0;
let tradeSide = 'yes';

// ─── PORTFOLIO ───
async function loadPortfolio() {
  try {
    const [balData, posData] = await Promise.all([
      api('GET', '/portfolio/balance'),
      api('GET', '/portfolio/positions?settlement_status=unsettled&limit=200'),
    ]);

    // Balance — try all known field names
    const b = balData.balance ?? balData;
    if (typeof b === 'number') {
      balance = b;
    } else {
      balance = b.available_balance ?? b.available_balance_cents ?? b.cash_balance ?? 0;
    }

    document.getElementById('balNum').textContent = (balance / 100).toLocaleString('en-US', { minimumFractionDigits: 2 });

    // Positions
    positions = posData.market_positions || posData.positions || [];
    document.getElementById('posCount').textContent = positions.length;
    renderPositions();

    // Exposure
    exposure = positions.reduce((s, p) => s + Math.abs(p.market_exposure ?? 0), 0);
    document.getElementById('dockExposure').textContent = '$' + (exposure / 100).toFixed(2);

    setLive(true);
  } catch (e) {
    setLive(false);
    document.getElementById('posList').innerHTML = `<div class="empty"><span class="prompt">${e.message}</span></div>`;
  }
}

function renderPositions() {
  const el = document.getElementById('posList');
  if (positions.length === 0) {
    el.innerHTML = '<div class="empty"><span class="prompt">&gt; No active positions.</span></div>';
    return;
  }
  el.innerHTML = positions.map(p => {
    const ticker = p.ticker || p.market_ticker || '—';
    const qty = Math.abs(p.position ?? p.total_traded ?? 0);
    const side = (p.position ?? 0) >= 0 ? 'yes' : 'no';
    const mktExposure = p.market_exposure ?? 0;
    const pnl = p.realized_pnl ?? 0;
    const pnlClass = pnl > 0 ? 'up' : pnl < 0 ? 'down' : 'flat';
    const pnlStr = (pnl >= 0 ? '+' : '') + '$' + (pnl / 100).toFixed(2);
    return `
      <div class="pos-item">
        <div>
          <div class="pos-ticker"><span class="side-tag ${side}">${side}</span>${ticker}</div>
          <div class="pos-meta">${qty} contracts</div>
        </div>
        <div class="pos-right">
          <div class="pos-value ${pnlClass}">${pnlStr}</div>
          <div class="pos-qty">$${(Math.abs(mktExposure) / 100).toFixed(2)} exp</div>
        </div>
      </div>`;
  }).join('');
}

// ─── ORDERS ───
async function loadOrders() {
  try {
    const [ordData, fillData] = await Promise.all([
      api('GET', '/portfolio/orders?status=resting&limit=100'),
      api('GET', '/portfolio/fills?limit=30'),
    ]);
    openOrders = ordData.orders || [];
    fills = fillData.fills || [];
    document.getElementById('dockOrders').textContent = openOrders.length;
    renderOrders();
    renderFills();
  } catch (e) {
    document.getElementById('openList').innerHTML = `<div class="empty"><span class="prompt">${e.message}</span></div>`;
  }
}

function renderOrders() {
  const el = document.getElementById('openList');
  if (openOrders.length === 0) {
    el.innerHTML = '<div class="empty"><span class="prompt">&gt; No open orders.</span></div>';
    return;
  }
  el.innerHTML = openOrders.map(o => `
    <div class="order-item">
      <div>
        <div class="pos-ticker"><span class="side-tag ${o.side}">${o.side}</span>${o.ticker}</div>
        <div class="pos-meta">${o.remaining_count ?? o.count ?? 0} @ ${o.yes_price ?? o.no_price ?? 0}&cent;</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="order-status-tag open">Open</span>
        <button class="cancel-btn" onclick="cancelOrder('${o.order_id}','${o.ticker}')">X</button>
      </div>
    </div>
  `).join('');
}

function renderFills() {
  const el = document.getElementById('fillsList');
  if (fills.length === 0) {
    el.innerHTML = '<div class="empty"><span class="prompt">&gt; No recent fills.</span></div>';
    return;
  }
  el.innerHTML = fills.slice(0, 15).map(f => {
    const t = new Date(f.created_time || f.ts).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    return `
      <div class="order-item">
        <div>
          <div class="pos-ticker"><span class="side-tag ${f.side}">${f.side}</span>${f.ticker}</div>
          <div class="pos-meta">${f.count} @ ${f.yes_price ?? f.no_price ?? 0}&cent; &middot; ${t}</div>
        </div>
        <span class="order-status-tag filled">Fill</span>
      </div>`;
  }).join('');
}

async function cancelOrder(id, ticker) {
  showModal('Cancel Order', `Cancel open order on <strong>${ticker}</strong>?`, async () => {
    try {
      await api('DELETE', `/portfolio/orders/${id}`);
      toast('Cancelled', 'ok');
      loadOrders();
    } catch (e) { toast(e.message, 'err'); }
  });
}

// ─── TRADE ───
function openTrade() { document.getElementById('tradePanel').classList.add('open'); }
function closeTrade() { document.getElementById('tradePanel').classList.remove('open'); }

function setSide(s) {
  tradeSide = s;
  document.getElementById('btnYes').className = 'side-btn' + (s === 'yes' ? ' sel-yes' : '');
  document.getElementById('btnNo').className = 'side-btn' + (s === 'no' ? ' sel-no' : '');
}

function adjustPrice(d) {
  const el = document.getElementById('tPrice');
  el.value = Math.max(1, Math.min(99, (parseInt(el.value) || 50) + d));
  updateCost();
}

function adjustQty(m) {
  const el = document.getElementById('tQty');
  el.value = Math.max(1, (parseInt(el.value) || 1) * m);
  updateCost();
}

function updateCost() {
  const p = parseInt(document.getElementById('tPrice').value) || 0;
  const q = parseInt(document.getElementById('tQty').value) || 0;
  document.getElementById('tCost').textContent = '$' + (p * q / 100).toFixed(2);
}

document.getElementById('tPrice').addEventListener('input', updateCost);
document.getElementById('tQty').addEventListener('input', updateCost);

function submitOrder() {
  const ticker = document.getElementById('tTicker').value.trim().toUpperCase();
  const price = parseInt(document.getElementById('tPrice').value);
  const qty = parseInt(document.getElementById('tQty').value);
  if (!ticker) { toast('Enter ticker', 'err'); return; }
  if (!price || price < 1 || price > 99) { toast('Price 1-99', 'err'); return; }
  if (!qty || qty < 1) { toast('Enter qty', 'err'); return; }

  showModal('Confirm Order',
    `<strong>${tradeSide.toUpperCase()}</strong> ${ticker}<br>${qty} @ ${price}&cent; = <strong>$${(price * qty / 100).toFixed(2)}</strong>`,
    async () => {
      const btn = document.getElementById('tSubmit');
      btn.disabled = true; btn.textContent = 'SENDING...';
      try {
        const body = { ticker, action: 'buy', type: 'limit', side: tradeSide, count: qty };
        if (tradeSide === 'yes') body.yes_price = price; else body.no_price = price;
        await api('POST', '/portfolio/orders', body);
        toast('Order placed', 'ok');
        closeTrade();
        document.getElementById('tTicker').value = '';
        document.getElementById('tPrice').value = '';
        document.getElementById('tQty').value = '';
        updateCost();
        loadPortfolio(); loadOrders();
      } catch (e) { toast(e.message, 'err'); }
      btn.disabled = false; btn.textContent = 'PLACE ORDER';
    }
  );
}

// ─── VIEWS ───
function showView(v) {
  document.getElementById('view-positions').style.display = v === 'positions' ? 'block' : 'none';
  document.getElementById('view-orders').style.display = v === 'orders' ? 'block' : 'none';
  document.querySelectorAll('.drawer-item').forEach(el => el.classList.remove('active'));
  if (v === 'orders') loadOrders();
  if (v === 'positions') loadPortfolio();
}

// ─── DRAWER ───
function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }
function closeDrawer(e) {
  if (e && e.target !== document.getElementById('drawer')) return;
  document.getElementById('drawer').classList.remove('open');
}

// ─── MODAL ───
let modalFn = null;
function showModal(title, body, fn) {
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mBody').innerHTML = body;
  modalFn = fn;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); modalFn = null; }
document.getElementById('mConfirm').addEventListener('click', () => { closeModal(); if (modalFn) modalFn(); });

// ─── HELPERS ───
function setLive(ok) {
  document.getElementById('liveDot').className = 'live-dot' + (ok ? '' : ' off');
  document.getElementById('liveText').textContent = ok ? 'LIVE' : 'OFF';
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || '');
  setTimeout(() => el.className = 'toast', 3000);
}
</script>

<!-- PASSCODE -->
<script>
const CODE = '326437';
let entry = '';
const dotEls = document.querySelectorAll('#dots .passcode-dot');
const dotsBox = document.getElementById('dots');

function updDots() { dotEls.forEach((d, i) => d.classList.toggle('filled', i < entry.length)); }

function check() {
  if (entry === CODE) {
    sessionStorage.setItem('kol_auth', '1');
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadPortfolio(); loadOrders();
  } else {
    dotsBox.classList.add('error');
    setTimeout(() => { entry = ''; dotsBox.classList.remove('error'); updDots(); }, 500);
  }
}

document.getElementById('numpad').addEventListener('click', e => {
  const b = e.target.closest('.numpad-btn');
  if (!b || b.classList.contains('empty')) return;
  if (b.classList.contains('del')) { entry = entry.slice(0, -1); updDots(); return; }
  const k = b.dataset.k;
  if (k && entry.length < CODE.length) { entry += k; updDots(); if (entry.length === CODE.length) setTimeout(check, 150); }
});

document.addEventListener('keydown', e => {
  if (document.getElementById('lockScreen').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9' && entry.length < CODE.length) {
    entry += e.key; updDots(); if (entry.length === CODE.length) setTimeout(check, 150);
  } else if (e.key === 'Backspace') { entry = entry.slice(0, -1); updDots(); }
});

if (sessionStorage.getItem('kol_auth') === '1') {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadPortfolio(); loadOrders();
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
