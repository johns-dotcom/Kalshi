<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kalshi">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<title>Kalshi</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.12);
    --accent-border: rgba(0,212,170,0.3);
    --danger: #ff5555;
    --danger-dim: rgba(255,85,85,0.12);
    --warn: #ffaa33;
    --warn-dim: rgba(255,170,51,0.12);
    --yes-color: #00d4aa;
    --no-color: #ff6b6b;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 0;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow-x: hidden;
  }

  /* ─── LOCK SCREEN ─── */
  #lockScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    padding: 40px 20px;
    user-select: none;
    -webkit-user-select: none;
  }

  .lock-logo {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(0,212,170,0.12);
    border: 2px solid rgba(0,212,170,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .lock-logo-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .lock-title {
    font-size: 20px;
    font-weight: 300;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
    color: var(--text);
  }

  .lock-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .passcode-dots {
    display: flex;
    gap: 16px;
    margin-bottom: 36px;
    height: 14px;
  }

  .passcode-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.35);
    background: transparent;
    transition: background 0.1s, border-color 0.1s, transform 0.1s;
  }

  .passcode-dot.filled {
    background: var(--text);
    border-color: var(--text);
  }

  .passcode-dots.error .passcode-dot {
    border-color: var(--danger);
    background: transparent;
    animation: dotShake 0.4s ease-in-out;
  }

  @keyframes dotShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 16px;
    justify-content: center;
  }

  .numpad-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 32px;
    font-weight: 300;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .numpad-btn:active { background: rgba(255,255,255,0.2); }

  .numpad-btn .sub {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 1px;
    font-weight: 500;
  }

  .numpad-btn.empty { border: none; background: none; cursor: default; }

  .numpad-btn.delete {
    border: none;
    background: none;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: var(--text);
  }

  .numpad-btn.delete:active { opacity: 0.5; background: none; }

  @media (max-height: 700px) {
    .numpad { gap: 10px; }
    .numpad-btn { width: 68px; height: 68px; font-size: 28px; }
    .passcode-dots { margin-bottom: 24px; }
  }

  /* ─── APP SHELL ─── */
  #appWrapper { display: none; min-height: 100vh; min-height: 100dvh; display: none; flex-direction: column; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .logo-dot.disconnected { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  .logo-dot.connecting { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: pulse 1s infinite; }

  .header-title { font-weight: 600; font-size: 15px; letter-spacing: -0.3px; }

  .header-balance {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  /* ─── TAB BAR ─── */
  .tab-bar {
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 0 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.15s;
  }

  .tab-btn.active { color: var(--accent); }
  .tab-btn .tab-icon { font-size: 22px; line-height: 1; }

  .tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: 80px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  .tab-page { display: none; }
  .tab-page.active { display: block; }

  /* ─── CARDS ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 12px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }

  /* ─── BALANCE CARD ─── */
  .balance-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .balance-item { text-align: center; }

  .balance-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .balance-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
  }

  .balance-value.positive { color: var(--accent); }
  .balance-value.negative { color: var(--danger); }

  /* ─── POSITIONS ─── */
  .position-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
  }

  .position-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .position-ticker {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.3px;
    word-break: break-all;
  }

  .position-pnl {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    margin-left: 10px;
  }

  .position-details {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .position-detail span { color: var(--text); font-weight: 500; }

  .side-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .side-yes { background: rgba(0,212,170,0.15); color: var(--yes-color); }
  .side-no  { background: rgba(255,107,107,0.15); color: var(--no-color); }

  /* ─── ORDERS ─── */
  .order-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
  }

  .order-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .order-ticker {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
  }

  .order-status {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .order-status.resting { background: var(--accent-dim); color: var(--accent); }
  .order-status.canceled, .order-status.cancelled { background: var(--danger-dim); color: var(--danger); }
  .order-status.executed { background: rgba(0,212,170,0.2); color: var(--accent); }
  .order-status.pending { background: var(--warn-dim); color: var(--warn); }

  .order-details {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .order-details span { color: var(--text); font-weight: 500; }

  .order-actions-row { margin-top: 8px; }

  /* ─── TRADE FORM ─── */
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 500;
  }

  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.15s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,170,0.12);
  }

  select option { background: #1a1a1a; }

  .field { margin-bottom: 14px; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .side-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
  }

  .side-toggle-btn {
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface2);
    color: var(--muted);
    -webkit-tap-highlight-color: transparent;
  }

  .side-toggle-btn.active-yes { background: rgba(0,212,170,0.15); color: var(--yes-color); }
  .side-toggle-btn.active-no { background: rgba(255,107,107,0.15); color: var(--no-color); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.98); }

  .btn-accent {
    background: var(--accent);
    color: #000;
    border-color: transparent;
    font-weight: 600;
  }

  .btn-danger { background: var(--danger-dim); color: var(--danger); border-color: rgba(255,85,85,0.25); }

  .btn-small { padding: 5px 10px; font-size: 12px; }

  .btn-full {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    border-radius: var(--radius-lg);
    background: var(--accent);
    color: #000;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-full:active:not(:disabled) { transform: scale(0.98); }
  .btn-full:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-full.sell {
    background: var(--danger);
  }

  .trade-cost {
    text-align: center;
    padding: 12px;
    margin-bottom: 14px;
    background: var(--surface2);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--muted);
  }

  .trade-cost .cost-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    display: block;
    margin-top: 4px;
  }

  /* ─── EMPTY & LOADING ─── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.4; }

  .loading-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 20px auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.3s;
  }

  .refresh-btn.spinning { animation: spin 0.6s linear infinite; }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 100%;
    max-width: 420px;
  }

  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

  .modal-body { margin-bottom: 16px; font-size: 13px; color: var(--muted); line-height: 1.6; }

  .modal-body strong { color: var(--text); }

  .warn-box {
    background: var(--warn-dim);
    border: 1px solid rgba(255,170,51,0.25);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--warn);
    margin-bottom: 16px;
  }

  .modal-actions { display: flex; gap: 10px; }
  .modal-actions .btn-full { flex: 1; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 20px;
    font-size: 13px;
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent-border); color: var(--accent); }
  .toast.error { border-color: rgba(255,85,85,0.3); color: var(--danger); }
</style>
</head>
<body>

<!-- ─── LOCK SCREEN ─── -->
<div id="lockScreen">
  <div class="lock-logo"><div class="lock-logo-dot"></div></div>
  <div class="lock-title">Kalshi</div>
  <div class="lock-sub">Enter Passcode</div>
  <div class="passcode-dots" id="passcodeDots">
    <div class="passcode-dot"></div>
    <div class="passcode-dot"></div>
    <div class="passcode-dot"></div>
    <div class="passcode-dot"></div>
    <div class="passcode-dot"></div>
    <div class="passcode-dot"></div>
  </div>
  <div class="numpad" id="numpad">
    <button class="numpad-btn" data-key="1"><span>1</span></button>
    <button class="numpad-btn" data-key="2"><span>2</span><span class="sub">A B C</span></button>
    <button class="numpad-btn" data-key="3"><span>3</span><span class="sub">D E F</span></button>
    <button class="numpad-btn" data-key="4"><span>4</span><span class="sub">G H I</span></button>
    <button class="numpad-btn" data-key="5"><span>5</span><span class="sub">J K L</span></button>
    <button class="numpad-btn" data-key="6"><span>6</span><span class="sub">M N O</span></button>
    <button class="numpad-btn" data-key="7"><span>7</span><span class="sub">P Q R S</span></button>
    <button class="numpad-btn" data-key="8"><span>8</span><span class="sub">T U V</span></button>
    <button class="numpad-btn" data-key="9"><span>9</span><span class="sub">W X Y Z</span></button>
    <div class="numpad-btn empty"></div>
    <button class="numpad-btn" data-key="0"><span>0</span></button>
    <button class="numpad-btn delete" id="deleteBtn">Delete</button>
  </div>
</div>

<!-- ─── APP ─── -->
<div id="appWrapper">

<header>
  <div class="header-left">
    <div class="logo-dot" id="statusDot"></div>
    <span class="header-title">Kalshi</span>
  </div>
  <span class="header-balance" id="headerBalance">--</span>
</header>

<div class="tab-content">

  <!-- PORTFOLIO TAB -->
  <div class="tab-page active" id="page-portfolio">
    <div class="card">
      <div class="balance-grid">
        <div class="balance-item">
          <div class="balance-label">Portfolio Value</div>
          <div class="balance-value" id="portfolioValue">--</div>
        </div>
        <div class="balance-item">
          <div class="balance-label">Available Cash</div>
          <div class="balance-value" id="availableCash">--</div>
        </div>
        <div class="balance-item">
          <div class="balance-label">Total P&L</div>
          <div class="balance-value" id="totalPnl">--</div>
        </div>
        <div class="balance-item">
          <div class="balance-label">Open Positions</div>
          <div class="balance-value" id="positionCount">--</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Active Positions</span>
        <button class="refresh-btn" onclick="loadPortfolio()" id="refreshPositions">&#8635;</button>
      </div>
      <div id="positionsList">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

  <!-- TRADE TAB -->
  <div class="tab-page" id="page-trade">
    <div class="card">
      <div class="card-header">
        <span class="card-title">New Order</span>
      </div>

      <div class="field">
        <label>Market Ticker</label>
        <input type="text" id="tradeTicker" placeholder="e.g. INXD-26APR11-B5450" style="text-transform:uppercase;" autocapitalize="characters" autocorrect="off" />
      </div>

      <div class="side-toggle" id="sideToggle">
        <button class="side-toggle-btn active-yes" data-side="yes" id="sideYes">YES</button>
        <button class="side-toggle-btn" data-side="no" id="sideNo">NO</button>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Price (cents)</label>
          <input type="number" id="tradePrice" placeholder="50" min="1" max="99" step="1" inputmode="numeric" />
        </div>
        <div class="field">
          <label>Contracts</label>
          <input type="number" id="tradeCount" placeholder="10" min="1" step="1" inputmode="numeric" />
        </div>
      </div>

      <div class="trade-cost" id="tradeCost">
        Max Cost
        <span class="cost-val" id="costVal">$0.00</span>
      </div>

      <button class="btn-full" id="placeOrderBtn" onclick="confirmOrder()">Place Order</button>
    </div>

    <!-- Quick bundle -->
    <div class="card" id="bundleCard" style="display:none;">
      <div class="card-header">
        <span class="card-title">Order Bundle</span>
        <button class="btn btn-small btn-danger" onclick="clearBundle()">Clear</button>
      </div>
      <div id="bundleList"></div>
      <button class="btn-full" onclick="confirmFireBundle()" style="margin-top:12px;" id="fireBundleBtn">Fire All Orders</button>
    </div>
  </div>

  <!-- ORDERS TAB -->
  <div class="tab-page" id="page-orders">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Open Orders</span>
        <button class="refresh-btn" onclick="loadOrders()" id="refreshOrders">&#8635;</button>
      </div>
      <div id="openOrdersList">
        <div class="loading-spinner"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Recent Fills</span>
      </div>
      <div id="recentFillsList">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="portfolio">
    <span class="tab-icon">&#9632;</span>
    Portfolio
  </button>
  <button class="tab-btn" data-tab="trade">
    <span class="tab-icon">&#9650;</span>
    Trade
  </button>
  <button class="tab-btn" data-tab="orders">
    <span class="tab-icon">&#9776;</span>
    Orders
  </button>
</div>

</div><!-- end appWrapper -->

<!-- ─── CONFIRM MODAL ─── -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Confirm Order</div>
    <div class="warn-box">This is a live order on Kalshi.</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn-full" id="modalConfirmBtn" onclick="executeModalAction()">Confirm</button>
      <button class="btn" onclick="closeModal()" style="padding:14px 24px;">Cancel</button>
    </div>
  </div>
</div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───
// All API calls go through the local server proxy at /kalshi/*
// The server handles authentication and signing
let currentSide = 'yes';
let modalAction = null;

// ─── API ───
async function makeRequest(method, path, body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch('/kalshi' + path, opts);
  const json = await res.json();
  if (!res.ok) throw new Error(json.message || json.error || `HTTP ${res.status}`);
  return json;
}

// ─── PORTFOLIO ───
async function loadPortfolio() {
  const btn = document.getElementById('refreshPositions');
  btn.classList.add('spinning');
  try {
    const [balanceData, positionsData] = await Promise.all([
      makeRequest('GET', '/portfolio/balance'),
      makeRequest('GET', '/portfolio/positions?settlement_status=unsettled&limit=200'),
    ]);

    const bal = balanceData.balance || balanceData;
    const available = (bal.available_balance || bal.available_balance_cents || 0);
    const portfolioVal = (bal.portfolio_value || bal.portfolio_value_cents || 0);
    const totalBal = available + portfolioVal;

    document.getElementById('headerBalance').textContent = '$' + (totalBal / 100).toFixed(2);
    document.getElementById('availableCash').textContent = '$' + (available / 100).toFixed(2);
    document.getElementById('portfolioValue').textContent = '$' + (portfolioVal / 100).toFixed(2);

    const positions = positionsData.market_positions || positionsData.positions || [];
    document.getElementById('positionCount').textContent = positions.length;

    renderPositions(positions);
    setStatus('connected');
  } catch (e) {
    setStatus('disconnected');
    document.getElementById('positionsList').innerHTML = `<div class="empty-state"><div class="empty-icon">&#9888;</div>Failed to load: ${e.message}</div>`;
  }
  btn.classList.remove('spinning');
}

function renderPositions(positions) {
  const el = document.getElementById('positionsList');

  if (positions.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128203;</div>No active positions</div>';
    document.getElementById('totalPnl').textContent = '$0.00';
    return;
  }

  let totalPnl = 0;

  el.innerHTML = positions.map(p => {
    const qty = Math.abs(p.total_traded || p.position || 0);
    const side = (p.total_traded || p.position || 0) > 0 ? 'yes' : (p.total_traded || p.position || 0) < 0 ? 'no' : 'yes';
    const avgPrice = p.average_price || 0;
    const currentValue = p.market_value || 0;
    const cost = p.total_cost || (qty * avgPrice);
    const pnl = p.realized_pnl !== undefined ? (p.realized_pnl + (currentValue - cost)) : (currentValue - cost);
    totalPnl += pnl;

    const pnlColor = pnl >= 0 ? 'var(--accent)' : 'var(--danger)';
    const pnlSign = pnl >= 0 ? '+' : '';

    return `
      <div class="position-item">
        <div class="position-top">
          <div>
            <span class="side-badge side-${side}">${side}</span>
            <span class="position-ticker">${p.ticker || p.market_ticker || '—'}</span>
          </div>
          <div class="position-pnl" style="color:${pnlColor}">${pnlSign}$${(pnl / 100).toFixed(2)}</div>
        </div>
        <div class="position-details">
          <div>Qty: <span>${qty}</span></div>
          <div>Avg: <span>${avgPrice}¢</span></div>
          <div>Value: <span>$${(currentValue / 100).toFixed(2)}</span></div>
        </div>
      </div>
    `;
  }).join('');

  const pnlEl = document.getElementById('totalPnl');
  pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + '$' + (totalPnl / 100).toFixed(2);
  pnlEl.className = 'balance-value ' + (totalPnl >= 0 ? 'positive' : 'negative');
}

// ─── ORDERS ───
async function loadOrders() {
  const btn = document.getElementById('refreshOrders');
  btn.classList.add('spinning');
  try {
    const [openData, fillsData] = await Promise.all([
      makeRequest('GET', '/portfolio/orders?status=resting&limit=100'),
      makeRequest('GET', '/portfolio/fills?limit=50'),
    ]);

    const openOrders = openData.orders || [];
    const fills = fillsData.fills || [];

    renderOpenOrders(openOrders);
    renderFills(fills);
  } catch (e) {
    document.getElementById('openOrdersList').innerHTML = `<div class="empty-state"><div class="empty-icon">&#9888;</div>${e.message}</div>`;
    document.getElementById('recentFillsList').innerHTML = '';
  }
  btn.classList.remove('spinning');
}

function renderOpenOrders(orders) {
  const el = document.getElementById('openOrdersList');
  if (orders.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128196;</div>No open orders</div>';
    return;
  }
  el.innerHTML = orders.map(o => `
    <div class="order-item">
      <div class="order-top">
        <div>
          <span class="side-badge side-${o.side}">${o.side}</span>
          <span class="order-ticker">${o.ticker}</span>
        </div>
        <span class="order-status resting">Open</span>
      </div>
      <div class="order-details">
        <div>Qty: <span>${o.remaining_count || o.count || 0}</span></div>
        <div>Price: <span>${o.yes_price || o.no_price || 0}¢</span></div>
        <div>Type: <span>${o.type || 'limit'}</span></div>
      </div>
      <div class="order-actions-row">
        <button class="btn btn-small btn-danger" onclick="confirmCancel('${o.order_id}', '${o.ticker}')">Cancel</button>
      </div>
    </div>
  `).join('');
}

function renderFills(fills) {
  const el = document.getElementById('recentFillsList');
  if (fills.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128200;</div>No recent fills</div>';
    return;
  }
  el.innerHTML = fills.slice(0, 20).map(f => {
    const time = new Date(f.created_time || f.ts).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    return `
      <div class="order-item">
        <div class="order-top">
          <div>
            <span class="side-badge side-${f.side}">${f.side}</span>
            <span class="order-ticker">${f.ticker}</span>
          </div>
          <span class="order-status executed">Filled</span>
        </div>
        <div class="order-details">
          <div>Qty: <span>${f.count}</span></div>
          <div>Price: <span>${f.yes_price || f.no_price || 0}¢</span></div>
          <div><span style="color:var(--muted)">${time}</span></div>
        </div>
      </div>
    `;
  }).join('');
}

// ─── TRADE ───
const tradeSide = { current: 'yes' };

document.getElementById('sideToggle').addEventListener('click', e => {
  const btn = e.target.closest('.side-toggle-btn');
  if (!btn) return;
  tradeSide.current = btn.dataset.side;
  document.getElementById('sideYes').className = 'side-toggle-btn' + (tradeSide.current === 'yes' ? ' active-yes' : '');
  document.getElementById('sideNo').className = 'side-toggle-btn' + (tradeSide.current === 'no' ? ' active-no' : '');
  updateCost();
});

function updateCost() {
  const price = parseInt(document.getElementById('tradePrice').value) || 0;
  const count = parseInt(document.getElementById('tradeCount').value) || 0;
  const cost = (price * count / 100).toFixed(2);
  document.getElementById('costVal').textContent = '$' + cost;
}

document.getElementById('tradePrice').addEventListener('input', updateCost);
document.getElementById('tradeCount').addEventListener('input', updateCost);

function confirmOrder() {
  const ticker = document.getElementById('tradeTicker').value.trim().toUpperCase();
  const price = parseInt(document.getElementById('tradePrice').value);
  const count = parseInt(document.getElementById('tradeCount').value);

  if (!ticker) { toast('Enter a market ticker', 'error'); return; }
  if (!price || price < 1 || price > 99) { toast('Price must be 1–99¢', 'error'); return; }
  if (!count || count < 1) { toast('Enter at least 1 contract', 'error'); return; }

  document.getElementById('modalTitle').textContent = 'Confirm Order';
  document.getElementById('modalBody').innerHTML = `
    <strong>${tradeSide.current.toUpperCase()}</strong> on <strong>${ticker}</strong><br>
    ${count} contract${count > 1 ? 's' : ''} @ ${price}¢ each<br>
    Max cost: <strong>$${(price * count / 100).toFixed(2)}</strong>
  `;
  document.getElementById('modalConfirmBtn').textContent = 'Place Order';
  document.getElementById('modalConfirmBtn').className = 'btn-full';
  modalAction = () => placeOrder(ticker, tradeSide.current, price, count);
  document.getElementById('confirmModal').classList.add('open');
}

async function placeOrder(ticker, side, price, count) {
  closeModal();
  const btn = document.getElementById('placeOrderBtn');
  btn.disabled = true;
  btn.textContent = 'Placing...';

  try {
    const body = {
      ticker,
      action: 'buy',
      type: 'limit',
      side,
      count,
    };
    if (side === 'yes') body.yes_price = price;
    else body.no_price = price;

    const res = await makeRequest('POST', '/portfolio/orders', body);
    const orderId = res.order?.order_id || res.order_id || '';
    toast('Order placed' + (orderId ? ' — ' + orderId.slice(0, 8) : ''), 'success');

    document.getElementById('tradeTicker').value = '';
    document.getElementById('tradePrice').value = '';
    document.getElementById('tradeCount').value = '';
    updateCost();

    loadPortfolio();
    loadOrders();
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Place Order';
}

function confirmCancel(orderId, ticker) {
  document.getElementById('modalTitle').textContent = 'Cancel Order';
  document.getElementById('modalBody').innerHTML = `Cancel open order on <strong>${ticker}</strong>?`;
  document.getElementById('modalConfirmBtn').textContent = 'Cancel Order';
  document.getElementById('modalConfirmBtn').className = 'btn-full sell';
  modalAction = () => cancelOrder(orderId);
  document.getElementById('confirmModal').classList.add('open');
}

async function cancelOrder(orderId) {
  closeModal();
  try {
    await makeRequest('DELETE', `/portfolio/orders/${orderId}`);
    toast('Order cancelled', 'success');
    loadOrders();
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

function executeModalAction() {
  if (modalAction) modalAction();
  modalAction = null;
}

function closeModal() {
  document.getElementById('confirmModal').classList.remove('open');
}

// ─── BUNDLE (kept for power users) ───
let bundle = [];

function addToBundle() {
  const ticker = document.getElementById('tradeTicker').value.trim().toUpperCase();
  const price = parseInt(document.getElementById('tradePrice').value);
  const count = parseInt(document.getElementById('tradeCount').value);

  if (!ticker || !price || !count) return;

  bundle.push({ id: Date.now().toString(36), ticker, side: tradeSide.current, price, count, status: 'pending' });
  localStorage.setItem('kalshi_bundle', JSON.stringify(bundle));
  renderBundle();
}

function clearBundle() {
  bundle = [];
  localStorage.removeItem('kalshi_bundle');
  renderBundle();
}

function renderBundle() {
  const card = document.getElementById('bundleCard');
  if (bundle.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  document.getElementById('bundleList').innerHTML = bundle.map(o => `
    <div class="order-item" style="margin-bottom:6px;">
      <div class="order-top">
        <div>
          <span class="side-badge side-${o.side}">${o.side}</span>
          <span class="order-ticker">${o.ticker}</span>
        </div>
        <span style="font-size:12px;color:var(--muted)">${o.count} @ ${o.price}¢</span>
      </div>
    </div>
  `).join('');
}

// ─── TABS ───
document.querySelector('.tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');

  if (tab === 'portfolio') loadPortfolio();
  if (tab === 'orders') loadOrders();
});

// ─── HELPERS ───
function setStatus(s) {
  const dot = document.getElementById('statusDot');
  dot.className = 'logo-dot' + (s === 'connected' ? '' : s === 'connecting' ? ' connecting' : ' disconnected');
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => { el.className = 'toast'; }, 3000);
}
</script>

<!-- ─── PASSCODE ─── -->
<script>
const APP_PASSCODE = '326437';
let passcodeEntry = '';
const dots = document.querySelectorAll('#passcodeDots .passcode-dot');
const dotsContainer = document.getElementById('passcodeDots');

function updateDots() {
  dots.forEach((dot, i) => dot.classList.toggle('filled', i < passcodeEntry.length));
}

function checkPasscode() {
  if (passcodeEntry === APP_PASSCODE) {
    sessionStorage.setItem('kol_auth', '1');
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('appWrapper').style.display = 'flex';
    initApp();
  } else {
    dotsContainer.classList.add('error');
    setTimeout(() => {
      passcodeEntry = '';
      dotsContainer.classList.remove('error');
      updateDots();
    }, 500);
  }
}

document.getElementById('numpad').addEventListener('click', e => {
  const btn = e.target.closest('.numpad-btn');
  if (!btn || btn.classList.contains('empty')) return;
  if (btn.classList.contains('delete')) {
    passcodeEntry = passcodeEntry.slice(0, -1);
    updateDots();
    return;
  }
  const key = btn.dataset.key;
  if (key && passcodeEntry.length < APP_PASSCODE.length) {
    passcodeEntry += key;
    updateDots();
    if (passcodeEntry.length === APP_PASSCODE.length) setTimeout(checkPasscode, 150);
  }
});

document.addEventListener('keydown', e => {
  if (document.getElementById('lockScreen').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9' && passcodeEntry.length < APP_PASSCODE.length) {
    passcodeEntry += e.key;
    updateDots();
    if (passcodeEntry.length === APP_PASSCODE.length) setTimeout(checkPasscode, 150);
  } else if (e.key === 'Backspace') {
    passcodeEntry = passcodeEntry.slice(0, -1);
    updateDots();
  }
});

async function initApp() {
  setStatus('connecting');
  loadPortfolio();
  loadOrders();
}

// Resume session
if (sessionStorage.getItem('kol_auth') === '1') {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('appWrapper').style.display = 'flex';
  initApp();
}

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
